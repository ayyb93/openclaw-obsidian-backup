version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_ENABLED_APIS=rest,graphql
      - GENERIC_TIMEZONE=UTC
      - WEBHOOK_URL=http://194.163.132.131:5678
      - DB_TYPE=sqlite
      - DB_PATH=/home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data:
